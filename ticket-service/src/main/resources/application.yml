server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://${TICKET_DB_HOST:localhost}:${TICKET_DB_PORT:5432}/${TICKET_DB_NAME:postgres}
    driver-class-name: org.postgresql.Driver
    username: ${TICKET_DB_USER:postgres}
    password: ${TICKET_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    web:
      pageable:
        sort-parameter: pageSort

integration:
  bank:
    base-url: ${BANK_SERVICE_BASE_URL:http://localhost:8081/api/v1}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Location}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  max-age: ${CORS_MAX_AGE:3600}
