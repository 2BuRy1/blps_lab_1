openapi: 3.0.3
info:
  title: Bank API (Mock)
  version: 1.0.0
  description: Minimal mock bank payment endpoint (SUCCESS/DECLINED).
servers:
  - url: http://localhost:8081/api/v1
paths:
  /bank/pay:
    post:
      summary: Authorize payment
      operationId: bankPay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankPayRequest"
      responses:
        "200":
          description: Payment decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankPayResponse"
        "400":
          description: Invalid payment request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankErrorResponse"

components:
  schemas:
    BankPayRequest:
      type: object
      required: [amount, card_number, expiration_date, cvv]
      properties:
        amount:
          type: integer
          minimum: 0
          description: Amount in minor units (e.g., RUB)
          example: 1500
        card_number:
          type: string
          example: "4111111111111111"
        expiration_date:
          type: string
          description: MM/YY
          example: "12/28"
        cvv:
          type: string
          example: "123"

    BankPayResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [SUCCESS, DECLINED]
          example: SUCCESS
        reason:
          type: string
          nullable: true
          description: Optional reason for decline
          example: "INSUFFICIENT_FUNDS"

    BankErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: "amount must be >= 0"