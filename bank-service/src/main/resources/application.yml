server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: bank-service
  datasource:
    url: jdbc:postgresql://${BANK_DB_HOST:localhost}:${BANK_DB_PORT:5432}/${BANK_DB_NAME:postgres}
    driver-class-name: org.postgresql.Driver
    username: ${BANK_DB_USER:postgres}
    password: ${BANK_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Location}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  max-age: ${CORS_MAX_AGE:3600}
